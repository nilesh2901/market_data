<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Data Risk</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&display=swap');
        body { font-family: 'IBM Plex Mono', monospace; background: #050505; color: #e4e4e7; margin: 0; overflow-x: hidden; }
        .glass-panel { background: rgba(15, 15, 15, 0.8); border: 1px solid #27272a; border-radius: 12px; backdrop-filter: blur(10px); }
        .stat-card { border-left: 3px solid #3b82f6; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .stat-card:hover { background: rgba(59, 130, 246, 0.05); transform: translateY(-2px); border-left-width: 6px; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        #chart-tooltip {
            width: 180px; position: absolute; display: none; padding: 12px;
            background: rgba(9, 9, 11, 0.95); color: #fff; z-index: 1000;
            border: 1px solid #3b82f6; border-radius: 8px; pointer-events: none;
        }
        .score-glow-green { text-shadow: 0 0 30px rgba(74, 222, 128, 0.4); }
        .score-glow-orange { text-shadow: 0 0 30px rgba(249, 115, 22, 0.4); }
        .score-glow-red { text-shadow: 0 0 40px rgba(239, 68, 68, 0.8); }
        .nav-btn { background: #18181b; border: 1px solid #27272a; transition: all 0.2s; cursor: pointer; }
        .nav-btn:hover:not(:disabled) { background: #27272a; border-color: #3b82f6; color: #3b82f6; }
        .nav-btn:active:not(:disabled) { transform: scale(0.95); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .override-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { background: rgba(153, 27, 27, 0.2); border-color: #ef4444; }
            50% { background: rgba(153, 27, 27, 0.5); border-color: #f87171; }
            100% { background: rgba(153, 27, 27, 0.2); border-color: #ef4444; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PriceChart = ({ data }) => {
            const chartContainerRef = useRef();
            const tooltipRef = useRef();
            const chartRef = useRef();

            useEffect(() => {
                if (!data || data.length === 0 || !chartContainerRef.current) return;
                if (chartRef.current) chartRef.current.remove();

                chartRef.current = LightweightCharts.createChart(chartContainerRef.current, {
                    layout: { background: { color: 'transparent' }, textColor: '#71717a' },
                    grid: { vertLines: { color: '#18181b' }, horzLines: { color: '#18181b' } },
                    width: chartContainerRef.current.offsetWidth,
                    height: 400,
                    timeScale: { borderColor: '#27272a' },
                    rightPriceScale: { borderColor: '#27272a', autoScale: true },
                });

                const lineSeries = chartRef.current.addAreaSeries({ 
                    lineColor: '#3b82f6', topColor: 'rgba(59, 130, 246, 0.2)', bottomColor: 'transparent', lineWidth: 3 
                });

                const ma50Series = chartRef.current.addLineSeries({ 
                    color: '#fbbf24', lineWidth: 2, title: '50MA', priceLineVisible: false 
                });

                const ma200Series = chartRef.current.addLineSeries({ 
                    color: '#ef4444', lineWidth: 2, lineStyle: 2, title: '200MA', priceLineVisible: false 
                });

                lineSeries.setData(data.map(d => ({ time: d.time, value: d.value })));
                ma50Series.setData(data.filter(d => d.ma50).map(d => ({ time: d.time, value: d.ma50 })));
                ma200Series.setData(data.filter(d => d.ma200).map(d => ({ time: d.time, value: d.ma200 })));
                
                chartRef.current.timeScale().fitContent();

                chartRef.current.subscribeCrosshairMove(param => {
                    const tooltip = tooltipRef.current;
                    if (!param.time || param.point.x < 0 || param.point.x > chartContainerRef.current.clientWidth) {
                        tooltip.style.display = 'none';
                    } else {
                        tooltip.style.display = 'block';
                        const price = param.seriesPrices.get(lineSeries);
                        const m50 = param.seriesPrices.get(ma50Series);
                        const m200 = param.seriesPrices.get(ma200Series);
                        
                        tooltip.innerHTML = `
                            <div class="text-[10px] text-zinc-500 uppercase mb-1 font-bold">Analysis</div>
                            <div class="text-xl font-black text-blue-400 mb-2">$${price ? price.toLocaleString(undefined, {minimumFractionDigits: 2}) : 'N/A'}</div>
                            <div class="flex flex-col gap-1 border-t border-zinc-800 pt-2 text-[10px]">
                                <div class="flex justify-between font-mono"><span class="text-amber-400">50MA:</span><span>$${m50 ? m50.toFixed(2) : '—'}</span></div>
                                <div class="flex justify-between font-mono"><span class="text-red-500">200MA:</span><span>$${m200 ? m200.toFixed(2) : '—'}</span></div>
                            </div>
                        `;
                        tooltip.style.left = (param.point.x + 20) + 'px';
                        tooltip.style.top = (param.point.y + 20) + 'px';
                    }
                });

                const handleResize = () => {
                    if (chartRef.current && chartContainerRef.current) {
                        chartRef.current.applyOptions({ width: chartContainerRef.current.offsetWidth });
                    }
                };

                window.addEventListener('resize', handleResize);
                return () => { 
                    window.removeEventListener('resize', handleResize); 
                    if (chartRef.current) chartRef.current.remove(); 
                };
            }, [data]);

            return (
                <div className="relative w-full overflow-hidden">
                    <div id="chart-tooltip" ref={tooltipRef}></div>
                    <div ref={chartContainerRef} className="w-full" />
                </div>
            );
        };

        function App() {
            const [market, setMarket] = useState(null);
            const [loading, setLoading] = useState(true);
            const [displayDate, setDisplayDate] = useState("");
            const [budget, setBudget] = useState(1000);
            const [isNavigating, setIsNavigating] = useState(false);
            const dateTracker = useRef("");

            const [isSyncing, setIsSyncing] = useState(false);
            const defaultTargets = [
                { ticker: 'VFV', price: 162.82, percent: 54 },
                { ticker: 'HXQ', price: 96.17, percent: 20 },
                { ticker: 'XEQT', price: 40.24, percent: 26 }
            ];
            const [targets, setTargets] = useState(defaultTargets);

            const addRow = () => setTargets([...targets, { ticker: 'NEW', price: 0, percent: 0 }]);
            const deleteRow = (idx) => setTargets(targets.filter((_, i) => i !== idx));
            const resetToDefault = () => setTargets(defaultTargets);
            
            const syncIntradayPrices = () => {
                setIsSyncing(true);
                const tickerList = targets.map(t => t.ticker).join(',');
                fetch(`/api/etf-prices?tickers=${tickerList}`)
                    .then(res => res.json())
                    .then(data => {
                        const updatedTargets = targets.map(t => ({
                            ...t,
                            price: data[t.ticker] || t.price 
                        }));
                        setTargets(updatedTargets);
                        setIsSyncing(false);
                    })
                    .catch(err => {
                        console.error("Sync failed:", err);
                        setIsSyncing(false);
                    });
            };

            const fetchData = (dateStr = "", targetBudget = budget) => {
                setLoading(true);
                let url = `/api/market-data?budget=${targetBudget}`;
                if (dateStr) url += `&date=${dateStr}`;

                fetch(url)
                    .then(res => {
                        if (!res.ok) throw new Error(`Server status: ${res.status}`);
                        return res.json();
                    })
                    .then(json => { 
                        setMarket(json); 
                        setDisplayDate(json.actualDate);
                        dateTracker.current = json.actualDate;
                        setLoading(false); 
                        setIsNavigating(false);
                    })
                    .catch(err => { 
                        console.error("Fetch Error:", err); 
                        setLoading(false); 
                        setIsNavigating(false);
                    });
            };

            const navigateDay = (offset) => {
                if (!dateTracker.current || isNavigating) return;
                setIsNavigating(true);
                const parts = dateTracker.current.split('-');
                const currentDate = new Date(parts[0], parts[1] - 1, parts[2]);
                currentDate.setDate(currentDate.getDate() + offset);
                const newDateStr = currentDate.toISOString().split('T')[0];
                fetchData(newDateStr);
            };

            useEffect(() => fetchData(), []);

            if (loading && !market) {
                return <div className="h-screen flex items-center justify-center bg-black text-blue-500 font-bold animate-pulse tracking-widest uppercase italic">Initializing...</div>;
            }

            if (!market) return <div className="h-screen flex items-center justify-center bg-black text-red-500 font-bold tracking-widest uppercase italic border-2 border-red-500">API_CONNECTION_ERROR</div>;

            const displayPrice = market.currentPrice || (market.chartData?.length > 0 ? market.chartData[market.chartData.length - 1].value : 0);
            
            const getTacticalProfile = () => {
                const isOverride = market.ma50Dist > 4.2 && market.rsi > 62;
                const score = market.opportunityScore;
                const dd = Math.abs(market.drawdown);
                const ma50Dist = market.ma50Dist;
                const rsi = market.rsi;

                if (isOverride) return { 
                    label: "OVERHEATED / TRIM", mult: 0.0, color: "text-red-500", glow: "score-glow-red", border: "border-red-600", 
                    desc: "BLOW-OFF RISK: Market is vertical. Sentiment is ecstatic. Moving to cash or hedges. Zero new buys.",
                    guidance: "PRO TIP: High prices and high excitement are a dangerous mix. Don't FOMO; wait for the market to come back to you." 
                };                
                
                if (score >= 75) return { 
                    label: "TERMINAL / MAX BUY", mult: 4.0, color: "text-green-400", glow: "score-glow-green", border: "border-green-500", 
                    desc: "TERMINAL CAPITULATION: Extreme fear detected. This is a historical accumulation window.",
                    guidance: "PRO TIP: This is where long-term wealth is built. It feels scary to buy when others are selling, but that's the secret." 
                };
                if (score >= 65) return { 
                    label: "AGGRESSIVE BUY", mult: 3.0, color: "text-green-400", glow: "score-glow-green", border: "border-green-400", 
                    desc: "HEALTHY CORRECTION: Tripling standard allocation to capitalize on lower prices.",
                    guidance: "PRO TIP: Think of this as a 'Flash Sale.' You're getting more shares for every dollar compared to last week." 
                };
                if (score >= 55) return { 
                    label: "MARKET FEAR / ACCEL", mult: 2.0, color: "text-blue-400", glow: "", border: "border-blue-500", 
                    desc: "STRUCTURAL DIP: Sentiment is breaking. Double your standard allocation.",
                    guidance: "PRO TIP: Volatility is normal. Use these small dips to accelerate your journey toward your goals." 
                };
                if (score <= 35) return { 
                    label: "FIZZING OUT / HOLD", mult: 0.5, color: "text-orange-500", glow: "score-glow-orange", border: "border-orange-500", 
                    desc: "MOMENTUM DECAY: Buying here is chasing the dragon. Halve allocation.",
                    guidance: "PRO TIP: Patience is a superpower. Better to hold some cash now than buy at the very top of a rally." 
                };
                return { 
                    label: "STEADY TAPE / DCA", mult: 1.0, color: "text-blue-400", glow: "", border: "border-blue-600", 
                    desc: "EQUILIBRIUM: Market tracking healthily. Maintain standard recurring allocation.",
                    guidance: "PRO TIP: Consistency is king. Your regular contributions are the most important part of your strategy right now." 
                };
            };

            const tactical = getTacticalProfile();
            const baseDaily = budget / 5;
            const isOverrideMode = market.ma50Dist > 4.2 && market.rsi > 62;

            const indicators = [
                { label: 'VIX (Fear)', val: market.vix || '0', range: 'Panic: >30', s: (market.vix || 0) > 25 ? 'PANIC' : 'CALM' },
                { label: 'RSI (Momentum)', val: (market.rsi || 0).toFixed(1), range: 'Hot: >70', s: (market.rsi || 0) > 65 ? 'HOT' : 'CHILL' },
                { label: '50MA Extension', val: (market.ma50Dist || 0) + '%', range: 'Danger: >5.5%', s: (market.ma50Dist || 0) > 5.5 ? 'RISK' : 'SAFE' },
                { label: 'Current DD', val: (market.drawdown || 0) + '%', range: 'Bear: <-20%', s: (market.drawdown || 0) < -5 ? 'DIP' : 'FLAT' },
                { label: 'Yield Curve', val: (market.yieldcurve || 0).toFixed(2) + '%', range: 'Bull: >0', s: (market.yieldcurve || 0) > 0 ? 'OK' : 'INVERT' },
                { label: 'Breadth (50D)', val: (market.breadth || 0) + '%', range: 'Strong: >70%', s: (market.breadth || 0) > 50 ? 'OK' : 'WEAK' },
                { label: '200MA Dist', val: (market.ma200 || 0).toFixed(1) + '%', range: 'Trend Health', s: (market.ma200 || 0) > 0 ? 'UP' : 'DOWN' },
                { 
                  label: 'Momentum (10D)', 
                  val: (market.momentum || 0).toFixed(0), 
                  range: 'Trend Strength', 
                  s: (market.momentum || 0) > 0 ? 'POS' : 'NEG',
                  trend: (market.momentum || 0) >= 0 ? 'up' : 'down'
                }
            ];

            return (
                <div className="max-w-6xl mx-auto p-6">
                    <header className="mb-6 flex flex-col md:flex-row justify-between items-start border-b border-zinc-900 pb-10 gap-6">
                        <div>
                            <h1 className="text-3xl font-bold tracking-tighter uppercase text-white leading-none">Market Data Risk</h1>
                            <div className="flex items-center gap-4 mt-6">
                                <div className="text-zinc-500 font-bold text-xl uppercase tracking-widest leading-none">
                                    <span className="w-2 h-2 bg-blue-500 rounded-full inline-block mr-2 animate-pulse"></span>
                                    {market?.lastUpdated || 'Connecting...'}
                                </div>
                                <div className="h-4 w-px bg-zinc-800"></div>
                                <div className="text-zinc-300 font-bold text-xl uppercase tracking-widest leading-none">
                                    S&P 500: <span className="text-blue-400 font-black">${displayPrice?.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col items-end gap-3">
                            <div className="flex items-center gap-2 bg-zinc-900 p-2 rounded-lg border border-zinc-800">
                                <span className="text-[10px] px-3 font-bold text-zinc-500 uppercase tracking-widest">Weekly_Budget:</span>
                                <input type="number" value={budget} onChange={(e) => { setBudget(e.target.value); fetchData(displayDate, e.target.value); }} className="bg-zinc-800 text-white font-bold p-2 w-28 rounded text-xs outline-none border border-zinc-700 focus:border-blue-500" />
                                <div className="h-4 w-px bg-zinc-700 mx-1"></div>
                                <button disabled={isNavigating} onClick={() => navigateDay(-1)} className="nav-btn px-4 py-2 rounded text-[10px] font-black uppercase text-zinc-400">← Prev</button>
                                <button onClick={() => fetchData()} className="text-[10px] px-3 font-bold text-zinc-500 uppercase hover:text-white">Reset</button>
                                <button disabled={isNavigating} onClick={() => navigateDay(1)} className="nav-btn px-4 py-2 rounded text-[10px] font-black uppercase text-zinc-400">Next →</button>
                            </div>
                            <div className="bg-zinc-900 p-2 rounded-lg border border-zinc-800 flex items-center">
                                <span className="text-[10px] px-3 font-bold text-zinc-500 uppercase tracking-widest">Jump_To:</span>
                                <input type="date" value={displayDate || ""} onChange={(e) => fetchData(e.target.value)} className="bg-zinc-800 text-white font-bold p-2 rounded text-xs uppercase cursor-pointer" />
                            </div>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
                        <div className="lg:col-span-2 glass-panel p-8 border-l-4 border-blue-500">
                            <h3 className="text-[10px] text-zinc-500 font-bold uppercase mb-6 italic tracking-widest underline">Deployment_Log_Weekly</h3>
                            <div className="grid grid-cols-5 gap-4">
                                {(market?.weeklyAllocations || []).map((log, i) => (
                                    <div key={i} className="bg-zinc-900/40 p-4 rounded border border-zinc-800 text-center">
                                        <div className="text-[9px] text-zinc-500 font-bold uppercase mb-2">{log.day}</div>
                                        <div className="text-xl font-bold text-white">${log.amount}</div>
                                        <div className="text-[8px] text-blue-500 font-bold mt-1">{log.multiplier}x</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="glass-panel p-8 flex flex-col items-center justify-center bg-blue-500/5 border-l-4 border-blue-400 text-center">
                            <h3 className="text-[10px] text-blue-400 font-bold uppercase mb-2 tracking-widest">Friday_DCA_Total</h3>
                            <div className="text-6xl font-black text-white leading-none">${market?.weeklyTotal?.toLocaleString() || "0"}</div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-6">
                        <div className={`glass-panel p-5 border-l-4 ${tactical.border} flex flex-col items-center justify-center text-center ${isOverrideMode ? 'override-pulse' : ''}`}>
                            <h3 className="text-[10px] text-zinc-500 font-bold uppercase mb-2 italic tracking-widest">Opportunity_Score</h3>
                            <div className={`text-7xl font-bold tracking-tighter ${tactical.glow} ${tactical.color}`}>{market?.opportunityScore || 0}</div>
                        </div>
                        <div className={`glass-panel p-5 border-l-4 ${tactical.border} flex flex-col items-center justify-center text-center`}>
                            <h3 className="text-[10px] text-zinc-500 font-bold uppercase mb-2 italic tracking-widest">Day_Multiplier</h3>
                            <div className={`text-7xl font-bold tracking-tighter ${tactical.color}`}>{tactical.mult}x</div>
                        </div>
                        <div className={`lg:col-span-2 glass-panel p-5 border-l-4 ${tactical.border} flex flex-col justify-center`}>
                            <h2 className={`text-3xl font-bold uppercase mb-4 italic tracking-tight ${tactical.color}`}>{tactical.label}</h2>
                            <p className="text-zinc-400 text-lg italic leading-relaxed">{tactical.desc}</p>
                        </div>
                    </div>                                        

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
                        <div className="lg:col-span-2 glass-panel p-8 relative overflow-hidden">
                            <h3 className="text-[10px] uppercase font-bold text-zinc-500 mb-6 italic underline tracking-widest">Market_Trajectory_180D</h3>
                            <PriceChart data={market?.chartData || []} />
                        </div> 
                        <div className="glass-panel p-8 flex flex-col justify-between border-l-4 border-zinc-700">
                            <div>
                                <h3 className="text-[10px] text-zinc-500 font-bold uppercase mb-6 underline italic tracking-widest">Weighting_Logic</h3>
                                <table className="w-full text-xs uppercase text-left">
                                    <tbody className="text-zinc-400">
                                        <tr className="border-b border-zinc-900">
                                            <td className="py-4 font-bold text-zinc-300">VIX Panic</td>
                                            <td className="text-right">{market?.vixPoints || 0} / 20</td>
                                        </tr>
                                        <tr className="border-b border-zinc-900">
                                            <td className="py-4 font-bold text-zinc-300">RSI Heat</td>
                                            <td className="text-right">{market?.rsiPoints || 0} / 25</td>
                                        </tr>
                                        <tr className="border-b border-zinc-900">
                                            <td className="py-4 font-bold text-zinc-300 text-red-400">Drawdown</td>
                                            <td className="text-right text-red-400">{market?.drawdownPoints || 0} / 15</td>
                                        </tr>
                                        <tr className="border-b border-zinc-900">
                                            <td className="py-4 font-bold text-zinc-300">Macro Health</td>
                                            <td className="text-right">{market?.macroPoints || 0} / 30</td>
                                        </tr>
                                        <tr className="border-b border-zinc-900">
                                            <td className="py-4 font-bold text-zinc-300">Breadth</td>
                                            <td className="text-right">{market?.breadthPoints || 0} / 10</td>
                                        </tr>
                                    </tbody>                                    
                                </table>
                            </div>
                            <div className="mt-6 pt-6 border-t border-zinc-900 flex flex-col gap-6">
                                <div className="bg-zinc-900/50 p-4 rounded border border-zinc-800">
                                    <div className="text-[10px] text-zinc-500 font-bold uppercase mb-1 tracking-widest">Terminal_Drawdown</div>
                                    <div className="text-3xl font-bold text-red-500 tracking-tighter leading-tight">{market?.maxDrawdown || 0}%</div>
                                    <div className="text-[11px] text-zinc-400 font-bold mt-2 uppercase italic tracking-wider leading-none">
                                        Observed: <span className="text-zinc-200">{market?.mddDate || "N/A"}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {indicators.map((item, i) => (
                            <div key={i} className="glass-panel p-8 stat-card">
                                <div className="flex justify-between items-start mb-4">
                                    <h4 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">{item.label}</h4>
                                    <span className="text-[9px] bg-zinc-900 px-2 py-1 rounded text-blue-500 font-bold border border-zinc-800 uppercase leading-none">{item.s}</span>
                                </div>
                                <div className="flex items-center gap-3 text-3xl font-bold tracking-tighter text-white mb-2">
                                    {item.val}
                                    {item.trend && (
                                        item.trend === 'up' ? (
                                            <svg className="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                                        ) : (
                                            <svg className="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                                        )
                                    )}
                                </div>
                                <div className="text-[10px] text-zinc-600 font-bold uppercase italic border-t border-zinc-900 pt-3 mt-1 tracking-wider">{item.range}</div>
                            </div>
                        ))}
                    </div>

                    <div className="mt-12 glass-panel p-8 border-t-4 border-blue-600">
                        <div className="flex justify-between items-center mb-8">
                            <div className="flex items-center gap-4">
                                <h3 className="text-[10px] text-zinc-500 font-bold uppercase italic tracking-widest underline">Target_Portfolio_Allocation</h3>
                                <button onClick={syncIntradayPrices} disabled={isSyncing} className={`${isSyncing ? 'bg-zinc-800 text-zinc-500 border-zinc-700' : 'bg-green-500/10 hover:bg-green-600 text-green-500 hover:text-white border-green-500/30'} text-[9px] font-black px-3 py-1.5 rounded border uppercase transition-all flex items-center gap-2 active:scale-95`}>
                                    <span className={isSyncing ? "animate-spin" : ""}>{isSyncing ? "◌" : "⚡"}</span>
                                    {isSyncing ? "Fetching..." : "Sync_Market"}
                                </button>
                                <button onClick={addRow} className="bg-zinc-800 hover:bg-blue-600 text-blue-400 hover:text-white text-[9px] font-black px-3 py-1.5 rounded border border-zinc-700 hover:border-blue-500 uppercase transition-all active:scale-95"> + Add_Asset </button>
                                <button onClick={resetToDefault} className="text-zinc-600 hover:text-zinc-400 text-[9px] font-black px-2 uppercase transition-all"> ↻ Reset </button>
                            </div>
                            <div className="flex items-center gap-3 bg-blue-500/10 px-3 py-2 rounded border border-blue-500/20">
                                <span className="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Deployable Capital: $</span>
                                <input type="number" value={market?.weeklyTotal || 0} onChange={(e) => setMarket({...market, weeklyTotal: parseFloat(e.target.value) || 0})} className="bg-transparent text-white font-black text-sm outline-none w-24 border-b border-blue-500/30 focus:border-blue-400" />
                            </div>
                        </div>
                        
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="border-b border-zinc-800 text-[10px] uppercase text-zinc-500 font-black tracking-tighter">
                                        <th className="pb-4 pl-2">Ticker_ID</th>
                                        <th className="pb-4">Intraday_Price</th>
                                        <th className="pb-4 text-center">Weight_%</th>
                                        <th className="pb-4 text-center">Allocation_$</th>
                                        <th className="pb-4 text-center">Shares</th>
                                        <th className="pb-4 pr-2 text-right">Action</th>
                                    </tr>
                                </thead>
                                <tbody className="text-xs font-bold uppercase tracking-tight">
                                    {targets.map((asset, idx) => {
                                        const allocationAmt = (market?.weeklyTotal || 0) * (asset.percent / 100);
                                        const shares = asset.price > 0 ? (allocationAmt / asset.price).toFixed(3) : "0.000";
                                        const hasError = asset.price === 0;
                                        return (
                                            <tr key={idx} className={`border-b border-zinc-900/50 hover:bg-zinc-800/10 transition-colors ${asset.percent === 0 ? 'opacity-40' : ''} ${hasError ? 'bg-red-500/5' : ''}`}>
                                                <td className="py-4 pl-2">
                                                    <div className="relative">
                                                        <input type="text" value={asset.ticker} onChange={(e) => {
                                                            const n = [...targets]; n[idx].ticker = e.target.value.toUpperCase(); setTargets(n);
                                                        }} className={`bg-zinc-900 font-black text-lg w-28 px-2 py-1 rounded border outline-none ${hasError ? 'border-red-500 text-red-500' : 'border-zinc-800 text-blue-400 focus:border-blue-500'}`} />
                                                        {hasError && <span className="absolute -top-6 left-0 text-[8px] text-red-500 font-bold uppercase tracking-tighter animate-pulse">! Invalid_Ticker</span>}
                                                    </div>
                                                </td>
                                                <td className="py-4">
                                                    <div className={`flex items-center gap-1 font-mono italic ${hasError ? 'text-red-900' : 'text-zinc-400'}`}>
                                                        <span>$</span>
                                                        <input type="number" step="0.01" value={asset.price} onChange={(e) => {
                                                            const n = [...targets]; n[idx].price = parseFloat(e.target.value) || 0; setTargets(n);
                                                        }} className="bg-transparent w-20 outline-none border-b border-zinc-800 focus:border-zinc-500 text-white" />
                                                    </div>
                                                </td>
                                                <td className="py-4 text-center">
                                                    <input type="number" value={asset.percent} onChange={(e) => {
                                                        const n = [...targets]; n[idx].percent = parseFloat(e.target.value) || 0; setTargets(n);
                                                    }} className="bg-zinc-900 text-green-500 w-16 p-2 rounded border border-zinc-800 focus:border-green-500 outline-none text-center font-black" />
                                                </td>
                                                <td className="py-4 text-center text-white font-mono">${allocationAmt.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                                                <td className="py-4 text-center"> <span className="text-blue-500 font-mono text-base px-3 py-1 bg-blue-500/5 rounded border border-blue-500/10"> {shares} </span> </td>
                                                <td className="py-4 pr-2 text-right"> <button onClick={() => deleteRow(idx)} className="text-zinc-800 hover:text-red-600 transition-colors px-2">✕</button> </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>

                        {(() => {
                            const totalAllocated = targets.reduce((sum, a) => sum + a.percent, 0);
                            const isValid = Math.abs(totalAllocated - 100) < 0.01;
                            return (
                                <div className={`mt-8 p-4 rounded-lg border flex justify-between items-center transition-all ${isValid ? 'bg-green-500/5 border-green-500/30' : 'bg-red-500/10 border-red-500/40 animate-pulse'}`}>
                                    <div className="flex items-center gap-4">
                                        <div className={`w-2 h-2 rounded-full ${isValid ? 'bg-green-500 shadow-[0_0_8px_#22c55e]' : 'bg-red-500'}`}></div>
                                        <span className={`text-[10px] font-black uppercase tracking-widest ${isValid ? 'text-green-500' : 'text-red-500'}`}>
                                            {isValid ? 'Allocation_Balanced' : `Logic_Error: ${totalAllocated.toFixed(1)}% / 100%`}
                                        </span>
                                    </div>
                                    <div className="text-[10px] font-bold text-zinc-600 uppercase">
                                        {isValid ? 'Ready for trade execution' : `Variance: ${(100 - totalAllocated).toFixed(1)}%`}
                                    </div>
                                </div>
                            );
                        })()}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
